global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    environment: "production"
    service: "enclave-go"

scrape_configs:
  - job_name: "enclave-go"
    scrape_interval: 10s
    metrics_path: "/metrics"
    scheme: http
    static_configs:
      - targets:
          - "enclave-go-service:9092"
        labels:
          instance: "enclave-go-worker"
          component: "enclave"

  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"
