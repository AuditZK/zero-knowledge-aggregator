version: '3.8'

services:
  enclave:
    build:
      context: .
      # OPS-AUDIT-001: must be Dockerfile.production — the generic Dockerfile
      # does NOT bundle snpguest, so attestation would silently fall back to
      # PlatformUnattestedDev and every signed report would carry attested=false.
      dockerfile: Dockerfile.production
    container_name: enclave_service
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      - ENV=production
      - PORT=8080
      - GRPC_PORT=50051
      - DATABASE_URL=${DATABASE_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # CFG-001: required in production. The enclave fatals on startup if
      # this is empty; use the `:?` form so Docker also refuses to render
      # the compose file without the env var set.
      - ENCLAVE_JWT_SECRET=${ENCLAVE_JWT_SECRET:?ENCLAVE_JWT_SECRET is required}
      # PERF-002: tell the Go runtime about the 512 MiB cgroup cap so the GC
      # can target it instead of computing its heap goal from the host's
      # (much larger) RAM. 480 MiB leaves a 32 MiB buffer below mem_limit so
      # the kernel OOM-killer doesn't fire before the runtime can react.
      - GOMEMLIMIT=480MiB
      # GOGC=75 trades a modest CPU bump for ~25% lower steady-state heap,
      # justified under the tight 512 MiB cap.
      - GOGC=75
      # GOTRACEBACK=single keeps panic dumps focused on the failing goroutine
      # so we don't bury operators in 50+ goroutine traces under SSE load.
      - GOTRACEBACK=single
    # SEV-SNP device access (AMD confidential computing)
    devices:
      - /dev/sev-guest:/dev/sev-guest
    # Security settings
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
    networks:
      - enclave-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

networks:
  enclave-network:
    driver: bridge
