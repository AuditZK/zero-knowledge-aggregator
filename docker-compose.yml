services:
  # =============================================
  # Enclave Go - Simulated TEE Environment
  # =============================================
  enclave-go:
    build:
      context: .
      dockerfile: Dockerfile
    image: enclave-go:latest
    container_name: enclave_go
    ports:
      - "8080:8080"    # REST API
      - "50051:50051"  # gRPC
      - "50052:50052"  # Log Stream (SSE)
      - "9090:9090"    # Prometheus Metrics
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://enclave:enclave@enclave-go-db:5432/enclave_go?sslmode=disable
      - ENV=production
      - LOG_LEVEL=info
      - LOG_STREAM_PORT=50052
      - METRICS_PORT=9090
      - METRICS_ENABLED=true
      - CORS_ORIGIN=*
      - GRPC_INSECURE=false
      - ENABLE_DAILY_SYNC=true
      - DATA_RETENTION_DAYS=30
    depends_on:
      enclave-go-db:
        condition: service_healthy
    restart: unless-stopped
    # --- TEE Simulation Constraints ---
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/enclave/certs
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - enclave-go-network

  # =============================================
  # PostgreSQL - Go Enclave Database
  # =============================================
  enclave-go-db:
    image: postgres:16-alpine
    container_name: enclave_go_db
    environment:
      POSTGRES_USER: enclave
      POSTGRES_PASSWORD: enclave
      POSTGRES_DB: enclave_go
    ports:
      - "5436:5432"
    volumes:
      - enclave-go-db-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enclave -d enclave_go"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - enclave-go-network

volumes:
  enclave-go-db-data:

networks:
  enclave-go-network:
    driver: bridge
