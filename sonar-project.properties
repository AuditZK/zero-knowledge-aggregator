# SonarQube configuration for the Go enclave service.
# Run: docker run --rm \
#        -e SONAR_HOST_URL=http://host.docker.internal:9000 \
#        -e SONAR_TOKEN=<your-token> \
#        -v "$PWD:/usr/src" \
#        sonarsource/sonar-scanner-cli

sonar.projectKey=zero-knowledge-aggregator-go
sonar.projectName=zero-knowledge-aggregator-go
sonar.projectVersion=1.0.0-go

# Sources & tests
sonar.sources=cmd,internal,pkg,api
sonar.tests=internal,pkg
sonar.test.inclusions=**/*_test.go

# Exclude generated, build artefacts, audit deliverables
sonar.exclusions=bin/**,doc/**,monitoring/**,migrations/**,certs/**,**/*.pb.go,**/*.pb.gw.go,**/enclave-*.tar.gz,**/enclave-*.tgz
sonar.coverage.exclusions=**/*_test.go,**/audit_*_test.go,api/**

# Source encoding
sonar.sourceEncoding=UTF-8

# Go-specific
sonar.go.file.suffixes=.go

# Coverage report (run `go test ./... -coverprofile=coverage.out` first)
sonar.go.coverage.reportPaths=coverage.out

# QUAL-001: documented Go-convention false positives.
#  - go:S100 disallows underscores in identifier names. Go's own testing
#    package documents the `Test<Subject>_<Condition>` convention for table
#    test variants and gopls/golangci-lint accept it as idiomatic. Suppressed
#    on *_test.go files only — production code still has to follow S100.
sonar.issue.ignore.multicriteria=goS100Tests
sonar.issue.ignore.multicriteria.goS100Tests.ruleKey=go:S100
sonar.issue.ignore.multicriteria.goS100Tests.resourceKey=**/*_test.go
